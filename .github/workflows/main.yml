name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff checks
        if: always()
        run: uv run ruff check --output-format=github .

      - name: Register Mypy problem matcher
        if: always()
        run: echo "::add-matcher::.github/mypy-matcher.json"

      - name: Run Mypy checks
        if: always()
        run: uv run mypy --show-column-numbers .
        env:
          SECRET_KEY: dummy
          POSTGRES_DB: dummy
          POSTGRES_USER: dummy
          POSTGRES_PASSWORD: dummy
          POSTGRES_HOST: dummy
          POSTGRES_PORT: 5432

  release-please:
    name: Release Please
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: python

  docker-publish:
    name: Build and Push Docker Image
    needs: [lint, release-please]
    # Execute if lint passed. Use always() to bypass the 'skipped' status of release-please on non-main branches
    if: |
      always() &&
      needs.lint.result == 'success' &&
      (github.ref_type == 'tag' || github.ref == 'refs/heads/main') &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=raw,value=${{ needs.release-please.outputs.tag_name }},enable=${{ needs.release-please.outputs.release_created == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
