upstream web_app {
    # "web" corresponds to the service name in docker-compose
    server web:8000;
}

server {
    listen 80;

    # Static files route
    location /static/ {
        alias /app/staticfiles/;
    }

    # Pass other requests to Django (Gunicorn)
    location / {
        proxy_pass http://web_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}